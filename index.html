<!DOCTYPE html>
<html>
<head>
  <title>Bookstore Management System</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
    }

    h1 {
      color: #333;
    }

    .container {
      width: 60%;
      margin: auto;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 200px;
    }

    button {
      padding: 10px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    .book {
      background: white;
      margin: 10px;
      padding: 10px;
      border-radius: 5px;
    }

    .delete {
      background: red;
      margin-left: 10px;
    }

    #search {
      width: 420px;
    }
  </style>
</head>
<body>

  <h1>📚 Bookstore Management System</h1>

  <div class="container">
    <input type="text" id="title" placeholder="Book Title">
    <input type="text" id="author" placeholder="Author">
    <button onclick="addBook()">Add Book</button>

    <br><br>

    <input type="text" id="search" placeholder="Search books..." onkeyup="searchBook()">

    <div id="bookList"></div>
  </div>

  <script>
    let books = JSON.parse(localStorage.getItem("books")) || [];

    function displayBooks(filteredBooks = books) {
      let bookList = document.getElementById("bookList");
      bookList.innerHTML = "";

      filteredBooks.forEach((book, index) => {
        let div = document.createElement("div");
        div.className = "book";

        div.innerHTML = `${book.title} by ${book.author}
          <button class="delete" onclick="deleteBook(${index})">Delete</button>`;

        bookList.appendChild(div);
      });
    }

    function addBook() {
      let title = document.getElementById("title").value;
      let author = document.getElementById("author").value;

      if (title === "" || author === "") {
        alert("Please enter all details");
        return;
      }

      books.push({ title, author });
      localStorage.setItem("books", JSON.stringify(books));

      displayBooks();

      document.getElementById("title").value = "";
      document.getElementById("author").value = "";
    }

    function deleteBook(index) {
      books.splice(index, 1);
      localStorage.setItem("books", JSON.stringify(books));
      displayBooks();
    }

    function searchBook() {
      let query = document.getElementById("search").value.toLowerCase();

      let filtered = books.filter(book =>
        book.title.toLowerCase().includes(query) ||
        book.author.toLowerCase().includes(query)
      );

      displayBooks(filtered);
    }

    // Load books on page load
    displayBooks();
  </script>

</body>
</html>
